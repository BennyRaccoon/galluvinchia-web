site_name: Galluvinchia Wiki
site_url: https://galluvinchia.com/wiki/
site_description: "The living compendium of the world of Galluvinchia: gods, lands, characters, and tales."
site_author: The Bun Cult
docs_dir: wiki-docs
site_dir: wiki-site
copyright: Copyright &copy; The Bun Cult

theme:
  name: material
  custom_dir: overrides
  logo: img/title.png
  favicon: img/favicon.png
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.tooltips
    - navigation.tracking
    - navigation.indexes
    - search.share

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true
          nav_translations:
            Home: Inicio
            Gods: Dioses
            World: Mundo
            Overview: Vista general
            Lesser Powers & Legends: Poderes Menores y Leyendas
            Cities: Ciudades
            Villages: Aldeas
            Points of Interest: Puntos de Interés
            Characters: Personajes
            Tales: Relatos
            "An'Ramoda": "An'Ramoda"
            Lady of Marmaros: Dama de Mármaros
            Lord of Carbohyrr: Señor de Carbohyrr
            Lorda Gorda: Lorda Gorda
            Jewel of Evergrowth: Joya Siemprecreciente
            Doormi: Doormi
            Pharoes: Pharoes
            Lakobordo: Lakobordo
            "An'Zulejosh": "An'Zulejosh"
            Montebordo: Montebordo
            Rivabordo: Rivabordo
            Whisk of Lumin: Whisk de Lumin
            The Neverender: El Rencarnatorno
            Ice Peak: Puntahelada
            Aurora Densasilva: Aurora Densasilva
            Breath of Sand: El Suspiro de Arena
            Ourobolis: Ourobolis
            The Mist: La Bruma
            The Academies: Las Academias
            Armada: Armada
            The Maneless King: El Rey sin Melena
            Monica Mars: Monica Mars
            Raquel: Raquel
            Kogarashi: Kogarashi
            Agustin: Agustín
            Silvino: Silvino
            Lewis Pendeltag: Lewis Pendeltag
            Martin Goldberg: Martin Goldberg
            Fernando Oldreekia: Fernando Oldreekia
            Merrion Meyer: Merrion Meyer
            Salgu: Salgu
            Lumin Oldreekia: Lumin Oldreekia
            Alice Rockwool: Alice Rockwool
            Myths: Mitos
            Legends: Leyendas
            Folktales: Cuentos Populares

markdown_extensions:
  - attr_list
  - md_in_html
  - meta
  - toc:
      permalink: true
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.smartsymbols

extra_css:
  - stylesheets/extra.css

extra:
  homepage: https://galluvinchia.com
  social:
    - icon: simple/discord
      link: https://discord.gg/94khqNMdzT
      name: Join the guild on Discord
    - icon: simple/patreon
      link: https://www.patreon.com/c/thebuncult
      name: Support us on Patreon
    - icon: fontawesome/solid/cart-shopping
      link: https://thebuncult.com
      name: The Bun Cult store

